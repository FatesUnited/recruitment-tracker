{% extends 'base.html' %}  
{% load static %} 
{% block content %}

<div class="page-header">
  <h1>Delete Member?</h1>
  <img src="{% static 'images/1024 Logo No BG.png' %}" alt="Vapor Lock Logo" />
</div>

<h2>Are you sure you want to delete {{ member.username }}?</h2>

<form action="" method="post" class="form">
  {% csrf_token %}
  <a href="{% url 'member_detail' member.id %}" class="btn secondary">Cancel</a>
  <button type="submit" class="btn danger">Yes - Delete!</button>
</form>

{% endblock %}
